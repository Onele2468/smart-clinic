openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SMART CLINIC - Healthcare SaaS Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: clinics
    description: Clinic management
  - name: members
    description: Clinic member management
  - name: patients
    description: Patient management
  - name: queues
    description: Queue management
  - name: appointments
    description: Appointment management
  - name: analytics
    description: Clinic analytics and dashboard data
  - name: notifications
    description: Notification management
  - name: pharmacy
    description: Pharmacy and dispensing management
  - name: lab
    description: Laboratory request and result management
  - name: billing
    description: Billing, invoices and payment management
  - name: whatsapp
    description: Per-clinic WhatsApp notification settings (admin only)
  - name: inventory
    description: Inventory and supplier management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ===== AUTH =====
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Account created — either immediately activated (presentation mode) or pending email verification
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/AuthResponse"
                  - $ref: "#/components/schemas/PendingVerificationResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      summary: Verify email with OTP code and activate account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailInput"
      responses:
        "200":
          description: Email verified, returns auth token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/resend-otp:
    post:
      operationId: resendOtp
      tags: [auth]
      summary: Resend email verification OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendOtpInput"
      responses:
        "200":
          description: OTP resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Email already verified or not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Email not verified — OTP sent to email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingVerificationResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request a password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Reset email sent (always returns success to prevent email enumeration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password using token from email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid or expired reset token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me/clinic:
    get:
      operationId: getMeClinic
      tags: [auth]
      summary: Get current user's clinic membership
      responses:
        "200":
          description: Current user's clinic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicMembership"
        "404":
          description: No clinic membership
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ===== CLINICS =====
  /clinics/doctors:
    get:
      operationId: getClinicDoctors
      tags: [clinics]
      summary: Get doctors in a clinic (for appointment dropdowns)
      parameters:
        - in: query
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of doctors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClinicDoctor"

  /clinics:
    post:
      operationId: createClinic
      tags: [clinics]
      summary: Create a new clinic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClinicInput"
      responses:
        "201":
          description: Clinic created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clinics/lookup:
    get:
      operationId: lookupClinic
      tags: [clinics]
      summary: Look up clinic by code
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Clinic found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicPublic"
        "404":
          description: Clinic not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clinics/mine:
    get:
      operationId: getMyClinic
      tags: [clinics]
      summary: Get clinic for current user
      responses:
        "200":
          description: Clinic details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"
        "404":
          description: Not in a clinic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clinics/{clinicId}:
    get:
      operationId: getClinic
      tags: [clinics]
      summary: Get clinic by ID
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Clinic details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"
    patch:
      operationId: updateClinic
      tags: [clinics]
      summary: Update clinic settings
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClinicUpdate"
      responses:
        "200":
          description: Updated clinic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"

  # ===== JOIN REQUESTS / MEMBERS =====
  /clinics/{clinicId}/join-requests:
    post:
      operationId: createJoinRequest
      tags: [members]
      summary: Request to join a clinic
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinRequestInput"
      responses:
        "201":
          description: Join request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinRequest"
    get:
      operationId: listJoinRequests
      tags: [members]
      summary: List pending join requests for clinic
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of join requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JoinRequest"

  /clinics/{clinicId}/join-requests/{requestId}:
    patch:
      operationId: updateJoinRequest
      tags: [members]
      summary: Approve or reject a join request
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: requestId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinRequestUpdate"
      responses:
        "200":
          description: Updated join request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinRequest"

  /clinics/{clinicId}/members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List clinic members
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClinicMember"

  /clinics/{clinicId}/members/{userId}:
    patch:
      operationId: updateMember
      tags: [members]
      summary: Update clinic member (role, status)
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberUpdate"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicMember"
    delete:
      operationId: removeMember
      tags: [members]
      summary: Remove a member from clinic
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ===== PATIENTS =====
  /clinics/{clinicId}/patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List patients in a clinic
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: List of patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Patient"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Register a new patient
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientInput"
      responses:
        "201":
          description: Patient created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /clinics/{clinicId}/patients/{patientId}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get patient details
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: patientId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Patient details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientDetail"
    patch:
      operationId: updatePatient
      tags: [patients]
      summary: Update patient info
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: patientId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientUpdate"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  # ===== QUEUES =====
  /clinics/{clinicId}/queues:
    get:
      operationId: listQueues
      tags: [queues]
      summary: List queue entries for clinic today
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
      responses:
        "200":
          description: List of queue entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QueueEntry"
    post:
      operationId: addToQueue
      tags: [queues]
      summary: Add patient to queue
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueueEntryInput"
      responses:
        "201":
          description: Queue entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueEntry"

  /clinics/{clinicId}/queues/{queueId}:
    patch:
      operationId: updateQueueEntry
      tags: [queues]
      summary: Update queue entry status
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: queueId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueueEntryUpdate"
      responses:
        "200":
          description: Updated queue entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueEntry"
    delete:
      operationId: removeFromQueue
      tags: [queues]
      summary: Remove entry from queue
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: queueId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /clinics/{clinicId}/queues/live:
    get:
      operationId: getLiveQueue
      tags: [queues]
      summary: Get live queue dashboard data
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Live queue summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveQueueSummary"

  # ===== APPOINTMENTS =====
  /clinics/{clinicId}/appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments for clinic
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: query
          name: date
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: doctorId
          schema:
            type: string
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Create appointment
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /clinics/{clinicId}/appointments/{appointmentId}:
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get appointment details
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: appointmentId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Appointment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update or reschedule appointment
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: appointmentId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: cancelAppointment
      tags: [appointments]
      summary: Cancel appointment
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: appointmentId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ===== ANALYTICS =====
  /clinics/{clinicId}/analytics/dashboard:
    get:
      operationId: getDashboardStats
      tags: [analytics]
      summary: Get clinic dashboard statistics
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /clinics/{clinicId}/analytics/activity:
    get:
      operationId: getRecentActivity
      tags: [analytics]
      summary: Get recent clinic activity feed
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /clinics/{clinicId}/activity-logs:
    get:
      operationId: getActivityLogs
      tags: [analytics]
      summary: Get paginated, filterable activity logs (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 25
        - in: query
          name: module
          schema:
            type: string
        - in: query
          name: userRole
          schema:
            type: string
        - in: query
          name: actionType
          schema:
            type: string
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date
        - in: query
          name: dateTo
          schema:
            type: string
            format: date
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: Paginated activity logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityLogsPage"

  /clinics/{clinicId}/analytics/queue-trends:
    get:
      operationId: getQueueTrends
      tags: [analytics]
      summary: Get queue volume trends (last 7 days)
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Queue trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QueueTrendPoint"

  /clinics/{clinicId}/analytics/overview:
    get:
      operationId: getAnalyticsOverview
      tags: [analytics]
      summary: Get clinic operational overview (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Clinic operational overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverviewAnalytics"

  /clinics/{clinicId}/analytics/queue-performance:
    get:
      operationId: getQueuePerformance
      tags: [analytics]
      summary: Get queue performance metrics (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Queue performance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueuePerformance"

  /clinics/{clinicId}/analytics/staff-performance:
    get:
      operationId: getStaffPerformance
      tags: [analytics]
      summary: Get staff performance metrics (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Staff performance data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffPerformance"

  # ===== NOTIFICATIONS =====
  /clinics/{clinicId}/notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for current user in clinic
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /clinics/{clinicId}/notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [analytics]
      summary: Mark all notifications as read for the current user
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: All notifications marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /clinics/{clinicId}/notifications/{notificationId}/read:
    patch:
