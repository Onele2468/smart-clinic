        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockAdjustInput"
      responses:
        "201":
          description: Stock adjusted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    # ===== OTP / VERIFICATION SCHEMAS =====
    PendingVerificationResponse:
      type: object
      required: [requiresVerification, email]
      properties:
        requiresVerification:
          type: boolean
        email:
          type: string
          format: email

    VerifyEmailInput:
      type: object
      required: [email, otp]
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          minLength: 6
          maxLength: 6

    ResendOtpInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordInput:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string
          minLength: 8

    # ===== AUTH SCHEMAS =====
    RegisterInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [clinic_admin, receptionist, nurse, doctor, pharmacist, lab_technician, cashier]
        governmentIdType:
          type: string
          enum: [SA_ID, PASSPORT]
        governmentIdNumber:
          type: string
        nationality:
          type: ["string", "null"]

    LoginInput:
      type: object
      required: [email, password]
      properties:
