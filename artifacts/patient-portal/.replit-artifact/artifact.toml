kind = "web"
previewPath = "/patient-portal/"
title = "Patient Portal"
version = "1.0.0"
id = "artifacts/patient-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/patient-portal/" ]
localPort = 24832

[services.development]
run = "pnpm --filter @workspace/patient-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/patient-portal", "run", "build" ]
publicDir = "artifacts/patient-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24832"
BASE_PATH = "/patient-portal/"
